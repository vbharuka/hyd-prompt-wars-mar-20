steps:
  # 1. Build the container image
  # We specify 'dir' to navigate into the sub-folder where the Next.js app lives
  - name: 'gcr.io/cloud-builders/docker'
    dir: 'medlink-mvp'
    args:
      - 'build'
      - '-t'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/med-link-repo/med-link-bridge:$COMMIT_SHA'
      - '-t'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/med-link-repo/med-link-bridge:latest'
      - '.'

  # 2. Push the container image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/med-link-repo/med-link-bridge'
      - '--all-tags'

  # 3. Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'med-link-bridge'
      - '--image'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/med-link-repo/med-link-bridge:$COMMIT_SHA'
      - '--region'
      - 'asia-south1'
      - '--allow-unauthenticated'
      - '--memory'
      - '1Gi'
      - '--set-env-vars'
      - 'GOOGLE_CLOUD_PROJECT=$PROJECT_ID'

images:
  - 'asia-south1-docker.pkg.dev/$PROJECT_ID/med-link-repo/med-link-bridge:$COMMIT_SHA'
  - 'asia-south1-docker.pkg.dev/$PROJECT_ID/med-link-repo/med-link-bridge:latest'

options:
  logging: CLOUD_LOGGING_ONLY
